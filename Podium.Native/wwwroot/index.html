<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>YouCent Podium</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/Podium.Shared/app.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <script>
        // Match the Web project's podiumCulture helper so shared Blazor code
        // can call it without errors.  In MAUI the real persistence happens
        // through Preferences/localStorage, but this keeps JS interop safe.
        window.podiumCulture = {
            get: function () {
                try { return window.localStorage.getItem('podium_language') || 'en'; }
                catch { return 'en'; }
            },
            set: function (value) {
                try { window.localStorage.setItem('podium_language', value); }
                catch { }
            }
        };
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
