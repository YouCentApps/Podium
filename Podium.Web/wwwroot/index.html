<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podium</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/Podium.Shared/app.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1f2937;">
            <p style="font-size: 1.5em;">Loading...</p>
            <p style="font-size: 0.9em; color: #4a4e59;">First launch may take a few moments</p>
        </div>
    </div>

    <noscript>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1f2937; max-width: 420px;">
            <p style="font-size: 1.5em; margin-bottom: 0.5em;">JavaScript is required</p>
            <p style="font-size: 0.95em; color: #4a4e59;">Podium is an interactive web application that requires JavaScript to run. Please enable JavaScript in your browser settings and reload the page.</p>
        </div>
    </noscript>
    <script>
        // Expose localStorage language so Blazor WASM can read it before first render
        window.podiumCulture = {
            get: () => window.localStorage.getItem('podium_language') || 'en',
            set: (value) => window.localStorage.setItem('podium_language', value)
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
