<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podium</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/Podium.Shared/app.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <p style="font-size: 1.5em;">Loading...</p>
        </div>
    </div>
    <script>
        // Expose localStorage language so Blazor WASM can read it before first render
        window.podiumCulture = {
            get: () => window.localStorage.getItem('podium_language') || 'en',
            set: (value) => window.localStorage.setItem('podium_language', value)
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
